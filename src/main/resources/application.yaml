server:
  port: 8081

spring:
  application:
    name: evin-core

  datasource:
    url: jdbc:mysql://localhost:3306/evin_core
    username: ${EVIN_DB_USER}
    password: ${EVIN_DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: never